name: Integration

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  run-example:
    name: Run introgression example script (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y samtools tabix build-essential

      - name: Show compiler versions
        run: |
          gcc --version
          g++ --version

      - name: Install package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install .

      - name: Install Chrome for Plotly
        run: plotly_get_chrome -y

      - name: Run introgressions example
        working-directory: panagram/introgressions
        run: bash run_example.sh
