name: Integration

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  run-example:
    name: Run introgression example script
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y samtools tabix build-essential

      - name: Install package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install .

      - name: Install Chrome for Plotly
        run: plotly_get_chrome -y

      - name: Run introgressions example
        working-directory: panagram/introgressions
        run: bash run_example.sh
